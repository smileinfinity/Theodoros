<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unbreakable Bond</title>
  <style>
    body {
      background-color: #fce4ec; /* Soft pink background */
      font-family: 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      color: #333;
    }
    h1 {
      margin-bottom: 20px;
      font-size: 28px;
      letter-spacing: 2px;
    }
    .slideshow-container {
      position: relative;
      width: 300px;
      height: 400px;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .slideshow-container img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      animation: fade 10s infinite;
    }
    /* Delays the second photo so they crossfade */
    .slideshow-container img:nth-child(1) {
      animation-delay: 0s;
    }
    .slideshow-container img:nth-child(2) {
      animation-delay: 5s;
    }

    @keyframes fade {
      0% { opacity: 0; }
      20% { opacity: 1; }
      50% { opacity: 1; }
      70% { opacity: 0; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

  <h1>Unbreakable Bond</h1>
  
  <div class="slideshow-container">
    <img src="photo1.jpg" alt="Photo 1">
    <img src="photo2.jpg" alt="Photo 2">
  </div>

</body>
</html>
